<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Live reading-time estimate as you type, powered by HTMX." />
    <title>Reading Time · HTMX</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="header">
      <h1>Reading time</h1>
      <p class="hint">Start typing — the estimate updates as you write (HTMX, no page reload).</p>
    </header>
    <main class="page">
      <form>
        <textarea
          name="text"
          rows="18"
          placeholder="Paste or write your text here..."
          autofocus
          hx-post="/readtime"
          hx-trigger="keyup changed delay:250ms"
          hx-target="#readtime"
          hx-swap="innerHTML"
        ></textarea>
      </form>

      <div id="readtime" aria-live="polite">
        <p class="stats muted">0 min read</p>
      </div>
    </main>
    <footer class="footer">
      <p>MIT © 2026 · <a href="mailto:piyush_mishra31@outlook.com">piyush_mishra31@outlook.com</a></p>
    </footer>
  </body>
</html>
