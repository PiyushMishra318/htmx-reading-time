<!DOCTYPE html>
<html lang="en">
  <head>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;600&family=Source+Sans+3:wght@400;600&display=swap" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Live reading-time estimate as you type, powered by HTMX." />
    <title>Reading Time · HTMX</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="theme-typing portfolio-designed">
  <div class="bg-animation" aria-hidden="true"></div>
    <header class="header">
        <div class="header__top">
      <a class="header__brand" href="https://piyushm.dev">piyushm.dev</a>
      <button type="button" id="theme-toggle" class="theme-toggle" aria-label="Toggle color theme" title="Toggle theme"><span class="theme-toggle__icon theme-toggle__icon--sun" aria-hidden="true">&#9728;</span><span class="theme-toggle__icon theme-toggle__icon--moon" aria-hidden="true">&#9789;</span></button>
    </div>

      <p class="eyebrow">HTMX · Express</p>
      <h1>Reading time</h1>
      <p class="hint">Start typing — the estimate updates as you write (HTMX, no page reload).</p>
    
    <a class="header__github" href="https://github.com/PiyushMishra318/htmx-reading-time" target="_blank" rel="noopener noreferrer">View on GitHub</a>
  </header>
    <main class="page-main page">
      <form>
        <textarea
          name="text"
          rows="18"
          placeholder="Paste or write your text here..."
          autofocus
          hx-post="/readtime"
          hx-trigger="keyup changed delay:250ms"
          hx-target="#readtime"
          hx-swap="innerHTML"
        ></textarea>
      </form>

      <div id="readtime" aria-live="polite">
        <p class="stats muted">0 sec read</p>
      </div>
    </main>
    <footer class="site-footer footer">
      <p>MIT © 2026 · <a href="https://piyushm.dev">piyushm.dev</a> · <a href="https://github.com/PiyushMishra318/htmx-reading-time" target="_blank" rel="noopener noreferrer">View on GitHub</a></p>
    </footer>
    <script src="/theme.js"></script>
</body>
</html>
